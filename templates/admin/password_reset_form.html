{% extends "admin/_reset_base.html" %}
{% block inner %}
<form method="post">{% csrf_token %}
  <p style="font-size:14px;margin:0 0 8px">Indique o e-mail da conta de administrador. Enviamos um link de recuperação.</p>
  {{ form.email.errors }}
  <label for="id_email">E-mail</label>
  {{ form.email }}
  <button type="submit">Enviar link de recuperação</button>
</form>
{% endblock %}
