name: veloma-rc

x-api-environment: &api-environment
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
  DJANGO_DEBUG: ${DJANGO_DEBUG}
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
  DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS}
  DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS}
  DJANGO_LANGUAGE_CODE: ${DJANGO_LANGUAGE_CODE}
  DJANGO_TIME_ZONE: ${DJANGO_TIME_ZONE}
  DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL}
  DATABASE_ENGINE: postgresql
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_HOST: veloma-postgres
  POSTGRES_PORT: "5432"
  POSTGRES_CONN_MAX_AGE: ${POSTGRES_CONN_MAX_AGE}
  CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@veloma-redis:6379/0
  CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@veloma-redis:6379/1
  CACHE_URL: redis://:${REDIS_PASSWORD}@veloma-redis:6379/2
  CREDENTIALS_ENCRYPTION_KEY: ${CREDENTIALS_ENCRYPTION_KEY}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
  FRONTEND_URL: ${FRONTEND_URL}
  MINIO_ENABLED: ${MINIO_ENABLED}
  MINIO_ENDPOINT: http://veloma-minio:9000
  MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
  MINIO_BUCKET: ${MINIO_BUCKET}
  MINIO_REGION: ${MINIO_REGION}
  MINIO_USE_SSL: "false"
  MINIO_VERIFY_SSL: "false"
  TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS}
  TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS}
  JWT_ACCESS_MINUTES: ${JWT_ACCESS_MINUTES}
  JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS}
  JWT_ROTATE_REFRESH_TOKENS: ${JWT_ROTATE_REFRESH_TOKENS}
  JWT_BLACKLIST_AFTER_ROTATION: ${JWT_BLACKLIST_AFTER_ROTATION}
  JWT_LEEWAY_SECONDS: ${JWT_LEEWAY_SECONDS}
  DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME}
  DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL}
  DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD}

services:
  veloma-app:
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
        reservations:
          memory: 192M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    container_name: veloma-app
    build:
      context: ./frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      BACKEND_URL: ${INTERNAL_API_URL}
      PORT: "3000"
    expose:
      - "3000"
    depends_on:
      veloma-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  veloma-api:
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    container_name: veloma-api
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *api-environment
      RUN_MIGRATIONS: ${RUN_MIGRATIONS}
      RUN_COLLECTSTATIC: ${RUN_COLLECTSTATIC}
      RUN_BOOTSTRAP: ${RUN_BOOTSTRAP}
      RUN_STAFF_SEED: ${RUN_STAFF_SEED}
    command: >-
      gunicorn config.wsgi:application
      --config gunicorn.conf.py
      --bind 0.0.0.0:8000
      --workers ${GUNICORN_WORKERS}
      --timeout ${GUNICORN_TIMEOUT}
      --access-logfile -
      --error-logfile -
      --log-level ${GUNICORN_LOG_LEVEL}
    expose:
      - "8000"
    volumes:
      - veloma-static-data:/app/staticfiles
    depends_on:
      veloma-postgres:
        condition: service_healthy
      veloma-redis:
        condition: service_healthy
      veloma-minio:
        condition: service_healthy
      veloma-minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  veloma-postgres:
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
        reservations:
          memory: 192M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    container_name: veloma-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - veloma-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  veloma-redis:
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 192M
        reservations:
          memory: 64M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    container_name: veloma-redis
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - .env
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - veloma-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '${REDIS_PASSWORD}' ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  veloma-celery:
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
        reservations:
          memory: 192M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    container_name: veloma-celery
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *api-environment
      RUN_MIGRATIONS: "false"
      RUN_COLLECTSTATIC: "false"
      RUN_BOOTSTRAP: "false"
    command: celery -A config worker --loglevel=${CELERY_LOG_LEVEL} --concurrency=${CELERY_CONCURRENCY}
    depends_on:
      veloma-api:
        condition: service_healthy

  veloma-celery-beat:
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 192M
        reservations:
          memory: 64M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    container_name: veloma-celery-beat
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *api-environment
      RUN_MIGRATIONS: "false"
      RUN_COLLECTSTATIC: "false"
      RUN_BOOTSTRAP: "false"
    command: celery -A config beat --loglevel=${CELERY_LOG_LEVEL} --schedule=/tmp/celerybeat-schedule
    depends_on:
      veloma-api:
        condition: service_healthy

  veloma-clamav:
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1536M
        reservations:
          memory: 768M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    container_name: veloma-clamav
    image: clamav/clamav:latest
    # ClamAV only publishes amd64 images; on arm64 hosts Docker emulates it.
    platform: linux/amd64
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CLAMAV_NO_FRESHCLAMD: ${CLAMAV_NO_FRESHCLAMD}
    volumes:
      - veloma-clamav-data:/var/lib/clamav
    expose:
      - "3310"
    healthcheck:
      test: ["CMD-SHELL", "clamdcheck.sh || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

  veloma-minio:
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 128M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    container_name: veloma-minio
    image: minio/minio:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - veloma-minio-data:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  veloma-minio-init:
    container_name: veloma-minio-init
    image: minio/mc:latest
    restart: "no"
    env_file:
      - .env
    depends_on:
      veloma-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set veloma http://veloma-minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY;
      mc mb --ignore-existing veloma/$$MINIO_BUCKET;
      exit 0;
      "

volumes:
  veloma-postgres-data:
  veloma-redis-data:
  veloma-minio-data:
  veloma-clamav-data:
  veloma-static-data:
